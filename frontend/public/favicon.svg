<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background with theme gradient and slight glow -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#grad)" filter="url(#glow)" />
  <!-- Inner dark card for contrast -->
  <rect x="48" y="48" width="416" height="416" rx="112" fill="#0b0f19" />
  <!-- Inner gradient border -->
  <rect x="48" y="48" width="416" height="416" rx="112" fill="none" stroke="url(#grad)" stroke-width="8" />
  <!-- Code Icon </ > in the center -->
  <path d="M190 170 L90 256 L190 342" fill="none" stroke="url(#grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M322 170 L422 256 L322 342" fill="none" stroke="url(#grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="280" y1="130" x2="232" y2="382" stroke="#ffffff" stroke-width="36" stroke-linecap="round" />
</svg>
